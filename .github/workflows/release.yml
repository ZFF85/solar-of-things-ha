name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release, for example v2.7.1"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build and publish GitHub release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Set release metadata
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          MANIFEST_VERSION=$(python3 -c "import json; print(json.load(open('custom_components/solar_of_things/manifest.json'))['version'])")
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "manifest_version=$MANIFEST_VERSION" >> "$GITHUB_OUTPUT"
          if [ "$VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::warning::Tag version $VERSION does not match manifest version $MANIFEST_VERSION"
          fi

      - name: Build HACS release ZIP
        run: |
          rm -f solar-of-things-ha.zip
          zip -r solar-of-things-ha.zip custom_components/solar_of_things/ \
            -x "*.pyc" -x "*/__pycache__/*"
          unzip -l solar-of-things-ha.zip

      - name: Extract changelog section
        run: |
          VERSION="${{ steps.meta.outputs.version }}"
          awk "/^## \[${VERSION}\]/{flag=1; next} /^## \[/{flag=0} flag" CHANGELOG.md > release_notes.txt
          if [ ! -s release_notes.txt ]; then
            cat > release_notes.txt <<'EOF'
          Solar of Things Home Assistant integration release.

          See the repository changelog and README for details.
          EOF
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: "${{ steps.meta.outputs.tag }} - Solar of Things"
          body_path: release_notes.txt
          draft: false
          prerelease: false
          files: solar-of-things-ha.zip
